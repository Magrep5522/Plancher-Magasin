<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Liste Magasin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #F0F2F5; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 20px 16px 40px; }
    .card { background: #fff; border-radius: 18px; box-shadow: 0 2px 20px rgba(0,0,0,0.10); width: 100%; max-width: 480px; overflow: hidden; }
    .card-header { background: #1A1A2E; padding: 22px 22px 18px; color: #fff; }
    .card-header .eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #7B8CDE; margin-bottom: 5px; }
    .card-header h1 { font-size: 20px; font-weight: 700; }
    .card-body { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #888; margin-bottom: 7px; }
    .field input, .field select { width: 100%; border: 1.5px solid #E0E3E9; border-radius: 10px; padding: 12px 14px; font-size: 16px; font-family: inherit; color: #1A1A2E; outline: none; background: #fff; -webkit-appearance: none; }
    .field input:focus, .field select:focus { border-color: #7B8CDE; box-shadow: 0 0 0 3px rgba(123,140,222,0.13); }
    .divider { height: 1px; background: #F0F2F5; }
    .add-section { display: flex; flex-direction: column; gap: 10px; }
    .add-row { display: flex; gap: 8px; align-items: stretch; }
    .add-row input { font-family: 'Courier New', monospace; flex: 1; border: 1.5px solid #E0E3E9; border-radius: 10px; padding: 12px 14px; font-size: 16px; color: #1A1A2E; outline: none; background: #fff; -webkit-appearance: none; }
    .add-row input:focus { border-color: #7B8CDE; box-shadow: 0 0 0 3px rgba(123,140,222,0.13); }
    .add-row-prix { display: flex; gap: 8px; }
    .add-row-prix input { flex: 1; border: 1.5px solid #E0E3E9; border-radius: 10px; padding: 10px 12px; font-size: 15px; color: #1A1A2E; outline: none; background: #fff; -webkit-appearance: none; }
    .add-row-prix input:focus { border-color: #7B8CDE; }
    .note-input { width: 100%; border: 1.5px solid #E0E3E9; border-radius: 10px; padding: 10px 12px; font-size: 15px; font-family: inherit; color: #1A1A2E; outline: none; background: #fff; resize: none; height: 60px; }
    .note-input:focus { border-color: #7B8CDE; }
    .btn-add { background: #1A1A2E; color: #fff; border: none; border-radius: 10px; width: 48px; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-add:active { transform: scale(0.92); }
    .btn-add:disabled { background: #ccc; }
    .cat-section { display: flex; flex-direction: column; gap: 8px; }
    .cat-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 10px; border-radius: 8px; }
    .cat-inclinables { background: #E8EAF6; color: #3949AB; }
    .cat-stationnaires { background: #E8F5E9; color: #2E7D32; }
    .cat-chambres { background: #FFF3E0; color: #E65100; }
    .cat-cuisines { background: #FCE4EC; color: #880E4F; }
    .model-block { border: 1.5px solid #E0E3E9; border-radius: 10px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; animation: pop-in 0.15s ease; }
    @keyframes pop-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .model-info { flex: 1; }
    .model-num { font-family: 'Courier New', monospace; font-weight: 700; font-size: 14px; color: #1A1A2E; }
    .model-sub { font-size: 12px; color: #888; margin-top: 2px; }
    .remove-btn { background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
    .remove-btn:active { color: #e44; }
    .empty-cat { font-size: 13px; color: #ccc; padding: 6px 10px; font-style: italic; }
    .count-badge { background: #1A1A2E; color: #fff; font-family: 'Courier New', monospace; font-size: 11px; padding: 2px 9px; border-radius: 20px; display: inline-block; margin-left: 8px; }
    .card-footer { padding: 18px 20px 24px; display: flex; flex-direction: column; gap: 10px; }
    .btn-copy { width: 100%; background: #7B8CDE; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-copy:active { background: #6070c5; }
    .btn-copy:disabled { background: #ccc; }
    .btn-copy.copied { background: #3DAA6F; }
    .btn-msg { width: 100%; background: #3DAA6F; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-msg:active { background: #2e8a58; }
    .btn-msg:disabled { background: #ccc; }
    .btn-msg.copied { background: #1A1A2E; }
    .btn-reset { width: 100%; background: none; color: #bbb; border: 1.5px solid #E0E3E9; border-radius: 12px; padding: 11px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-reset:active { background: #fef0f0; color: #e44; border-color: #e44; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A1A2E; color: #fff; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.22s, transform 0.22s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="eyebrow">Gestion stock</div>
    <h1>Liste de modèles</h1>
  </div>
  <div class="card-body">

    <div class="field">
      <label>Nom du magasin</label>
      <input type="text" id="storeName" placeholder="Ex. : Boutique Saint-Laurent" autocomplete="off">
    </div>

    <div class="field">
      <label>Date de visite</label>
      <input type="date" id="visitDate">
    </div>

    <div class="divider"></div>

    <!-- Formulaire ajout -->
    <div class="add-section">
      <div class="field">
        <label>Catégorie</label>
        <select id="catSelect">
          <option value="Inclinables">🛋 Inclinables</option>
          <option value="Stationnaires">🛋 Stationnaires</option>
          <option value="Chambres">🛏 Chambres</option>
          <option value="Cuisines">🪑 Cuisines</option>
        </select>
      </div>
      <div class="add-row">
        <input type="text" id="modelInput" placeholder="Numéro de modèle" autocomplete="off" autocapitalize="characters">
        <button class="btn-add" id="btnAdd" onclick="addModel()" disabled>+</button>
      </div>
      <div class="add-row-prix">
        <input type="number" id="prixInput" placeholder="Prix (optionnel)">
        <input type="text" id="noteInput" placeholder="Note (optionnel)">
      </div>
    </div>

    <div class="divider"></div>

    <!-- Listes par catégorie -->
    <div id="listesCategories"></div>

  </div>
  <div class="card-footer">
    <button class="btn-copy" id="btnCopy" onclick="copyPourExcel()" disabled>📋 Copier pour Excel</button>
    <button class="btn-msg" id="btnMsg" onclick="copyPourMessage()" disabled>💬 Copier pour message</button>
    <button class="btn-reset" onclick="resetAll()">🗑 Tout effacer</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  var CATEGORIES = ['Inclinables', 'Stationnaires', 'Chambres', 'Cuisines'];
  var CAT_COLORS = {
    'Inclinables':   'cat-inclinables',
    'Stationnaires': 'cat-stationnaires',
    'Chambres':      'cat-chambres',
    'Cuisines':      'cat-cuisines'
  };
  var CAT_ICONS = {
    'Inclinables':   '🛋',
    'Stationnaires': '🛋',
    'Chambres':      '🛏',
    'Cuisines':      '🪑'
  };

  // models[cat] = [{num, prix, note}]
  var models = { Inclinables: [], Stationnaires: [], Chambres: [], Cuisines: [] };

  var modelInput = document.getElementById('modelInput');
  var btnAdd     = document.getElementById('btnAdd');
  var btnCopy    = document.getElementById('btnCopy');
  var btnMsg     = document.getElementById('btnMsg');

  // Date today
  var today = new Date();
  var yyyy  = today.getFullYear();
  var mm    = String(today.getMonth()+1).padStart(2,'0');
  var dd    = String(today.getDate()).padStart(2,'0');
  document.getElementById('visitDate').value = yyyy+'-'+mm+'-'+dd;

  modelInput.addEventListener('input', function() { btnAdd.disabled = this.value.trim() === ''; });
  modelInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addModel(); });

  function naturalSort(a, b) {
    return a.num.localeCompare(b.num, undefined, { numeric: true, sensitivity: 'base' });
  }

  function addModel() {
    var val  = modelInput.value.trim().toUpperCase();
    if (!val) return;
    var cat  = document.getElementById('catSelect').value;
    var prix = document.getElementById('prixInput').value.trim();
    var note = document.getElementById('noteInput').value.trim();
    models[cat].push({ num: val, prix: prix, note: note });
    models[cat].sort(naturalSort);
    modelInput.value = '';
    document.getElementById('prixInput').value = '';
    document.getElementById('noteInput').value = '';
    btnAdd.disabled = true;
    modelInput.focus();
    render();
  }

  function removeModel(cat, idx) {
    models[cat].splice(idx, 1);
    render();
  }

  function totalCount() {
    return CATEGORIES.reduce(function(acc, c) { return acc + models[c].length; }, 0);
  }

  function render() {
    var container = document.getElementById('listesCategories');
    container.innerHTML = '';
    var total = totalCount();
    btnCopy.disabled = total === 0;
    btnMsg.disabled  = total === 0;

    CATEGORIES.forEach(function(cat) {
      var section = document.createElement('div');
      section.className = 'cat-section';

      var title = document.createElement('div');
      title.className = 'cat-title ' + CAT_COLORS[cat];
      title.innerHTML = CAT_ICONS[cat] + ' ' + cat +
        (models[cat].length > 0 ? '<span class="count-badge">' + models[cat].length + '</span>' : '');
      section.appendChild(title);

      if (models[cat].length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty-cat';
        empty.textContent = 'Aucun modèle';
        section.appendChild(empty);
      } else {
        models[cat].forEach(function(m, i) {
          var block = document.createElement('div');
          block.className = 'model-block';
          var sub = [];
          if (m.prix) sub.push(m.prix + '$');
          if (m.note) sub.push(m.note);
          block.innerHTML =
            '<div class="model-info">' +
              '<div class="model-num">' + m.num + '</div>' +
              (sub.length ? '<div class="model-sub">' + sub.join(' — ') + '</div>' : '') +
            '</div>' +
            '<button class="remove-btn" onclick="removeModel(\'' + cat + '\',' + i + ')">×</button>';
          section.appendChild(block);
        });
      }
      container.appendChild(section);
    });
  }

  function buildExcel() {
    var store = document.getElementById('storeName').value.trim();
    var date  = document.getElementById('visitDate').value;
    var rows  = [];
    rows.push('Nom du magasin\t' + store);
    rows.push('Date\t' + date);
    rows.push('');
    rows.push('Catégorie\tModele\tPrix\tNote');
    CATEGORIES.forEach(function(cat) {
      models[cat].forEach(function(m) {
        rows.push(cat + '\t' + m.num + '\t' + m.prix + '\t' + m.note);
      });
    });
    return rows.join('\n');
  }

  function buildMessage() {
    var store = document.getElementById('storeName').value.trim();
    var date  = document.getElementById('visitDate').value;
    var lines = [];
    if (store) lines.push('Magasin : ' + store);
    if (date)  lines.push('Date : ' + date);
    CATEGORIES.forEach(function(cat) {
      if (models[cat].length > 0) {
        lines.push('');
        lines.push(CAT_ICONS[cat] + ' ' + cat);
        models[cat].forEach(function(m) {
          var line = m.num;
          if (m.prix) line += '  —  ' + m.prix + '$';
          if (m.note) line += '  (' + m.note + ')';
          lines.push(line);
        });
      }
    });
    return lines.join('\n');
  }

  function copyPourExcel() {
    if (totalCount() === 0) return;
    copier(buildExcel(), btnCopy, '📋 Copier pour Excel', '✓ Copié pour Excel !', '✓ Copié — colle dans Excel');
  }

  function copyPourMessage() {
    if (totalCount() === 0) return;
    copier(buildMessage(), btnMsg, '💬 Copier pour message', '✓ Copié !', '✓ Copié — colle dans ton message');
  }

  function copier(text, btn, labelOrig, labelCopied, toastMsg) {
    function done() {
      btn.classList.add('copied');
      btn.textContent = labelCopied;
      showToast(toastMsg);
      setTimeout(function() { btn.classList.remove('copied'); btn.innerHTML = labelOrig; }, 2500);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function() { fallback(text, done); });
    } else { fallback(text, done); }
  }

  function fallback(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) { alert('Copiez manuellement :\n\n' + text); }
    document.body.removeChild(ta);
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  function resetAll() {
    if (totalCount() === 0 && !document.getElementById('storeName').value) return;
    if (confirm('Tout effacer ?')) {
      models = { Inclinables: [], Stationnaires: [], Chambres: [], Cuisines: [] };
      document.getElementById('storeName').value = '';
      document.getElementById('visitDate').value = yyyy+'-'+mm+'-'+dd;
      modelInput.value = '';
      document.getElementById('prixInput').value = '';
      document.getElementById('noteInput').value = '';
      btnAdd.disabled = true;
      render();
    }
  }

  render();
</script>
</body>
</html>
